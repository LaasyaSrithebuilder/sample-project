services:
  - type: web
    name: sample-project
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn sample_project.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: sample-project-db
          property: connectionString

databases:
  - name: sample-project-db
    plan: free