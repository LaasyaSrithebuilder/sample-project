<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f0f2f5; }
        .navbar { background: #4a90e2; padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; }
        .navbar h1 { color: white; margin: 0; font-size: 20px; }
        .navbar form button { padding: 8px 16px; background: #e74c3c; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .container { padding: 24px; }
        .btn { padding: 10px 20px; background: #4a90e2; color: white; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 20px; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        th { background: #4a90e2; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        tr:last-child td { border-bottom: none; }
        .btn-edit { padding: 6px 12px; background: #f39c12; color: white; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 13px; }
        .btn-delete { padding: 6px 12px; background: #e74c3c; color: white; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 13px; }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>Welcome, {{ user.username }}</h1>
        <form method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit">Logout</button>
        </form>
    </div>
    <div class="container">
        <a href="{% url 'employee_add' %}" class="btn">+ Add Employee</a>
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Department</th>
                    <th>Salary</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for emp in employees %}
                <tr>
                    <td>{{ emp.name }}</td>
                    <td>{{ emp.email }}</td>
                    <td>{{ emp.phone }}</td>
                    <td>{{ emp.department }}</td>
                    <td>{{ emp.salary }}</td>
                    <td>
                        <a href="{% url 'employee_edit' emp.pk %}" class="btn-edit">Edit</a>
                        <a href="{% url 'employee_delete' emp.pk %}" class="btn-delete">Delete</a>
                    </td>
                </tr>
                {% empty %}
                <tr><td colspan="6" style="text-align:center;">No employees found.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
